<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fixed Footer - Team Sudharshan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5.3.7 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding-bottom: 80px; /* prevent footer from overlapping content */
    }

    .fixed-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(90deg, #0d6efd, #6610f2);
      color: white;
      text-align: center;
      padding: 1rem 0;
      border-top: 2px solid white;
      z-index: 1030;
    }

    .fixed-footer h6 {
      margin-bottom: 0.25rem;
      font-weight: 600;
      color: aqua;
    }

    .fixed-footer p {
      margin: 0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  

  <!-- Fixed Footer -->
  <footer class="fixed-footer">
    <div class="container">
      <h6>Developed by Sudharshan</h6>
      <p>© 2025 | All Rights Reserved</p>
    </div>
  </footer>

  <!-- Bootstrap Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
